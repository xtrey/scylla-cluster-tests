# SCYLLADB-2122: Paxos table growth reproduction (VNODES)
#
# Same as tablets variant but with tablets disabled (vnodes) for comparison.
#
# Customer scenario (Solitics cluster 44881):
#   - INSERT IF NOT EXISTS for idempotency
#   - Wide partitions: PRIMARY KEY ((brand, subscriber_id), creation_date, unique_key)
#   - $paxos table: 645 GB vs user table: 226 GB (2.85:1 ratio)
#   - paxos_grace_seconds = 864000 (10 days) — paxos entries persist as LIVE data
#   - tombstone_gc = repair mode — only repair cleans tombstones (no repair running)
#
# REPRODUCTION MECHANISM (per Petr Gusev, SCYLLADB-2122 comment 64802):
#   1. LWT-write a large number of UNIQUE primary keys (INSERT IF NOT EXISTS).
#      Each successful CAS leaves a paxos_state entry retained for
#      paxos_grace_seconds (10 days), regardless of the base row's fate.
#   2. Delete those rows with a REGULAR (non-LWT) DELETE. This empties the base
#      table but does NOT touch the colocated $paxos entries.
#   Result: base table ~empty, $paxos retains every key -> ratio >> 1:1.
#
# TTL lever (makes a 1h run diverge):
#   base default_time_to_live (300s) < test duration (~1h) << paxos_grace_seconds (10d)
#
# Test logic (test_paxos_growth):
#   - Phase 1 (populate ~10m): INSERT IF NOT EXISTS over a large UNIQUE key space
#   - Phase 2 (delete ~10m): REGULAR (non-LWT) DELETE over the same key range
#   - Phase 3 (reclaim): wait past base TTL, repair + major compaction -> ratio > 1:1
#
# Cluster: 3 nodes, 1 DC, vnodes (tablets disabled)
# Duration: ~100 min total
# Success criterion: on-disk paxos:user ratio > 1:1 after reclaim.

test_duration: 100

stress_cmd:
  - "cassandra-stress user profile=/tmp/cs_paxos_growth_lwt.yaml 'ops(write_insert-if-not-exists=1)' no-warmup cl=QUORUM serial-cl=LOCAL_SERIAL duration=10m -mode native cql3 -rate threads=400 -pop 'seq=1..50000000'"

stress_read_cmd:
  - "cassandra-stress user profile=/tmp/cs_paxos_growth_lwt.yaml 'ops(read_serial-select=1)' no-warmup cl=LOCAL_SERIAL duration=50m -mode native cql3 -rate threads=50 -pop 'seq=1..50000000'"

stress_cmd_w:
  - "cassandra-stress user profile=/tmp/cs_paxos_growth_lwt.yaml 'ops(delete_plain=1)' no-warmup cl=QUORUM duration=10m -mode native cql3 -rate threads=400 -pop 'seq=1..50000000'"

n_db_nodes: 3
n_loaders: 3
round_robin: true

# EBS-backed instance to match customer's I/O characteristics
instance_type_db: 'r5b.2xlarge'
instance_type_loader: 'c7i.xlarge'
instance_type_monitor: 't3.large'
instance_type_runner: 'm7i.2xlarge'

# Single gp2 EBS volume — constrained I/O to match customer's EBS characteristics
data_volume_disk_num: 1
data_volume_disk_type: "gp2"
data_volume_disk_size: 300

instance_provision: 'on_demand'

nemesis_class_name: 'NoOpMonkey'
nemesis_during_prepare: false

user_prefix: 'lwt-paxos-vnodes'

use_preinstalled_scylla: true
use_mgmt: false
backtrace_decoding: true

append_scylla_args: '--blocked-reactor-notify-ms 500 --abort-on-lsa-bad-alloc 1 --abort-on-seastar-bad-alloc --abort-on-internal-error 1 --abort-on-ebadf 1'
append_scylla_yaml:
  auto_snapshot: false
  rf_rack_valid_keyspaces: false
  enable_tablets: false
  tablets_mode_for_new_keyspaces: 'disabled'
